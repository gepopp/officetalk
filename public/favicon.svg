<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
    <title>OfficeTalk Favicon</title>
    <desc>Vereinfachte Bildmarke für Favicon-Größen 16–32 px. Verkürzte Rillen, gefülltes Objektiv, Reflex erhalten.</desc>

    <!-- Gehäuse -->
    <rect x="3" y="8" width="26" height="20" rx="1" ry="1" fill="#E3B505" />

    <!-- Griff -->
    <path d="M 12 8 L 12 4 L 20 4 L 20 8"
          stroke="#E3B505" stroke-width="2" fill="none" stroke-linecap="square" />

    <!-- Rillen zentral gekürzt -->
    <line x1="10" y1="12" x2="22" y2="12" stroke="#111111" stroke-width="1.5" />
    <line x1="10" y1="24" x2="22" y2="24" stroke="#111111" stroke-width="1.5" />

    <!-- Objektiv -->
    <circle cx="16" cy="18" r="4.5" fill="#111111" />

    <!-- Lichtreflex -->
    <ellipse cx="14.7" cy="16.7" rx="1.6" ry="0.8" fill="#FAFAF7" opacity="0.7" transform="rotate(-30 14.7 16.7)" />
</svg>
