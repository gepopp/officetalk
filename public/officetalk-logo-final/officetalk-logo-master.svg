<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" viewBox="0 0 1200 1500" width="1200" height="1500">

    <title>OfficeTalk – Logo Master Sheet · K1 final</title>
    <desc>Alle Lockups, Bildmarken und Monochrom-Varianten. Koffer mit integriertem Kamera-Objektiv. Rillen zentral gekürzt, Reflex bei 70 Prozent Deckkraft.</desc>

    <defs>
        <style type="text/css">
            <![CDATA[
                .wordmark { font-family: 'Fraunces', 'Tiempos Headline', Georgia, serif; font-weight: 500; letter-spacing: -0.015em; }
                .label { font-family: 'Inter', Arial, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; fill: #5A5A55; }
                .caption { font-family: 'Inter', Arial, sans-serif; font-size: 11px; fill: #5A5A55; }
            ]]>
        </style>

        <!-- Bildmarke: K1 in allen vier Farbausprägungen -->

        <!-- Primär: Gehäuse gelb, Rillen/Linse schwarz, Reflex weiss 70% -->
        <symbol id="mark-color" viewBox="0 0 140 84">
            <path d="M 54 14 L 54 6 L 86 6 L 86 14" stroke="#E3B505" stroke-width="4" fill="none" stroke-linecap="square" />
            <rect x="12" y="16" width="116" height="60" rx="2" ry="2" fill="#E3B505" />
            <line x1="42" y1="28" x2="98" y2="28" stroke="#111111" stroke-width="4" />
            <line x1="42" y1="64" x2="98" y2="64" stroke="#111111" stroke-width="4" />
            <circle cx="70" cy="46" r="11" fill="#111111" />
            <ellipse cx="66.5" cy="43" rx="3.6" ry="1.8" fill="#FAFAF7" opacity="0.7" transform="rotate(-30 66.5 43)" />
        </symbol>

        <!-- Monochrom schwarz: Outline, Reflex als Aussparung in Paper -->
        <symbol id="mark-black" viewBox="0 0 140 84">
            <path d="M 54 14 L 54 6 L 86 6 L 86 14" stroke="#111111" stroke-width="4" fill="none" stroke-linecap="square" />
            <rect x="12" y="16" width="116" height="60" rx="2" ry="2" stroke="#111111" stroke-width="4" fill="none" />
            <line x1="42" y1="28" x2="98" y2="28" stroke="#111111" stroke-width="4" />
            <line x1="42" y1="64" x2="98" y2="64" stroke="#111111" stroke-width="4" />
            <circle cx="70" cy="46" r="11" fill="#111111" />
            <ellipse cx="66.5" cy="43" rx="3.6" ry="1.8" fill="#FAFAF7" opacity="0.7" transform="rotate(-30 66.5 43)" />
        </symbol>

        <!-- Invers auf dunkel: Gehäuse gelb, Linse schwarz, Reflex weiss -->
        <symbol id="mark-invert" viewBox="0 0 140 84">
            <path d="M 54 14 L 54 6 L 86 6 L 86 14" stroke="#E3B505" stroke-width="4" fill="none" stroke-linecap="square" />
            <rect x="12" y="16" width="116" height="60" rx="2" ry="2" fill="#E3B505" />
            <line x1="42" y1="28" x2="98" y2="28" stroke="#111111" stroke-width="4" />
            <line x1="42" y1="64" x2="98" y2="64" stroke="#111111" stroke-width="4" />
            <circle cx="70" cy="46" r="11" fill="#111111" />
            <ellipse cx="66.5" cy="43" rx="3.6" ry="1.8" fill="#FAFAF7" opacity="0.7" transform="rotate(-30 66.5 43)" />
        </symbol>

        <!-- Invers Monochrom: Alles in Paper, Linse gefüllt, Reflex dunkel -->
        <symbol id="mark-invert-mono" viewBox="0 0 140 84">
            <path d="M 54 14 L 54 6 L 86 6 L 86 14" stroke="#FAFAF7" stroke-width="4" fill="none" stroke-linecap="square" />
            <rect x="12" y="16" width="116" height="60" rx="2" ry="2" stroke="#FAFAF7" stroke-width="4" fill="none" />
            <line x1="42" y1="28" x2="98" y2="28" stroke="#FAFAF7" stroke-width="4" />
            <line x1="42" y1="64" x2="98" y2="64" stroke="#FAFAF7" stroke-width="4" />
            <circle cx="70" cy="46" r="11" fill="#FAFAF7" />
            <ellipse cx="66.5" cy="43" rx="3.6" ry="1.8" fill="#2B2B28" opacity="0.7" transform="rotate(-30 66.5 43)" />
        </symbol>
    </defs>

    <!-- Hintergrund -->
    <rect width="1200" height="1500" fill="#FAFAF7" />

    <!-- Kopf -->
    <g inkscape:label="Titel" id="titel">
        <text x="60" y="80" class="wordmark" font-size="36" fill="#111111">OfficeTalk</text>
        <text x="60" y="108" class="caption" font-size="14">Logo-Master-Sheet · K1 final · April 2026</text>
        <line x1="60" y1="130" x2="1140" y2="130" stroke="#E3B505" stroke-width="3" />
    </g>

    <!-- 01: Primärvariante -->
    <g inkscape:label="01-lockup-color" id="lockup-color">
        <text x="60" y="180" class="label">01 — Full Lockup · Primärvariante</text>
        <rect x="60" y="200" width="540" height="200" fill="#FAFAF7" stroke="#E4E2DB" stroke-width="1" stroke-dasharray="2 4" />
        <use href="#mark-color" x="100" y="250" width="140" height="84" />
        <text x="260" y="320" class="wordmark" font-size="72" fill="#111111">OfficeTalk</text>
        <text x="60" y="430" class="caption">Hauptanwendung: Website-Header, Impressum, Visitenkarten. Koffer-Gehäuse Accent, Rillen und Objektiv Ink, Reflex Paper bei 70 % Deckkraft.</text>
    </g>

    <!-- 02: Monochrom Schwarz -->
    <g inkscape:label="02-lockup-black" id="lockup-black">
        <text x="660" y="180" class="label">02 — Monochrom Schwarz</text>
        <rect x="660" y="200" width="480" height="200" fill="#FAFAF7" stroke="#E4E2DB" stroke-width="1" stroke-dasharray="2 4" />
        <use href="#mark-black" x="700" y="250" width="140" height="84" />
        <text x="860" y="320" class="wordmark" font-size="72" fill="#111111">OfficeTalk</text>
        <text x="660" y="430" class="caption">Für Fax, Einfarb-Druck, gestempelte Dokumente, Schwarz-Weiß-Inserat.</text>
    </g>

    <!-- 03: Invers auf dunkel -->
    <g inkscape:label="03-lockup-invert" id="lockup-invert">
        <text x="60" y="490" class="label">03 — Invers · Auf dunklen Flächen</text>
        <rect x="60" y="510" width="540" height="200" fill="#2B2B28" />
        <use href="#mark-invert" x="100" y="560" width="140" height="84" />
        <text x="260" y="630" class="wordmark" font-size="72" fill="#FAFAF7">OfficeTalk</text>
        <text x="60" y="740" class="caption">Für Footer, Video-Credits, Keynote-Folien. Koffer-Gehäuse bleibt Accent, Wortmarke wechselt auf Paper.</text>
    </g>

    <!-- 04: Invers Monochrom -->
    <g inkscape:label="04-lockup-invert-mono" id="lockup-invert-mono">
        <text x="660" y="490" class="label">04 — Invers Monochrom</text>
        <rect x="660" y="510" width="480" height="200" fill="#2B2B28" />
        <use href="#mark-invert-mono" x="700" y="560" width="140" height="84" />
        <text x="860" y="630" class="wordmark" font-size="72" fill="#FAFAF7">OfficeTalk</text>
        <text x="660" y="740" class="caption">Fallback für Anwendungen ohne Zweifarbigkeit auf dunklem Grund.</text>
    </g>

    <!-- 05: Bildmarke solo -->
    <g inkscape:label="05-mark-only" id="mark-only">
        <text x="60" y="800" class="label">05 — Bildmarke solo · Favicon · Social Avatar · Thumbnail-Signet</text>

        <rect x="60" y="820" width="180" height="180" fill="#FAFAF7" stroke="#E4E2DB" stroke-width="1" stroke-dasharray="2 4" />
        <use href="#mark-color" x="80" y="870" width="140" height="84" />
        <text x="60" y="1020" class="caption">5a · Auf hell</text>

        <rect x="270" y="820" width="180" height="180" fill="#2B2B28" />
        <use href="#mark-invert" x="290" y="870" width="140" height="84" />
        <text x="270" y="1020" class="caption">5b · Auf dunkel</text>

        <rect x="480" y="820" width="180" height="180" fill="#FAFAF7" stroke="#E4E2DB" stroke-width="1" stroke-dasharray="2 4" />
        <use href="#mark-black" x="500" y="870" width="140" height="84" />
        <text x="480" y="1020" class="caption">5c · Monochrom schwarz</text>

        <rect x="690" y="820" width="180" height="180" fill="#2B2B28" />
        <use href="#mark-invert-mono" x="710" y="870" width="140" height="84" />
        <text x="690" y="1020" class="caption">5d · Monochrom invers</text>
    </g>

    <!-- 06: Konstruktion -->
    <g inkscape:label="06-konstruktion" id="konstruktion">
        <text x="60" y="1080" class="label">06 — Konstruktion · Schutzraum und Proportionen</text>

        <g transform="translate(80, 1100)">
            <!-- Schutzraum -->
            <rect x="-20" y="-20" width="180" height="124" fill="none" stroke="#E3B505" stroke-width="1" stroke-dasharray="4 4" />

            <!-- Hilfslinien -->
            <line x1="-20" y1="20" x2="160" y2="20" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />
            <line x1="-20" y1="40" x2="160" y2="40" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />
            <line x1="-20" y1="60" x2="160" y2="60" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />
            <line x1="-20" y1="80" x2="160" y2="80" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />
            <line x1="20" y1="-20" x2="20" y2="104" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />
            <line x1="120" y1="-20" x2="120" y2="104" stroke="#5A5A55" stroke-width="0.5" stroke-dasharray="2 2" />

            <use href="#mark-color" x="0" y="0" width="140" height="84" />

            <text x="170" y="10" class="caption">Gehäuse 2:1 · 116 × 60 Einheiten</text>
            <text x="170" y="30" class="caption">Griff 32 Einheiten, mittig, 10 hoch</text>
            <text x="170" y="50" class="caption">Rillen verkürzt: x=42–98 (Länge 56)</text>
            <text x="170" y="70" class="caption">Objektiv r=11, zentriert (70, 46)</text>
            <text x="170" y="90" class="caption">Reflex rx=3.6 ry=1.8, −30°, 70 % Deckkraft</text>
        </g>

        <text x="60" y="1260" class="caption">Schutzraum: 1× Rillen-Höhe rund um die Bildmarke. Stroke 4 px bei viewBox 140 × 84.</text>
        <text x="60" y="1278" class="caption">Mindestgröße digital: 24 px Bildmarken-Höhe. Darunter Favicon-Variante mit reduziertem Detail nutzen.</text>
        <text x="60" y="1296" class="caption">Mindestgröße Print: 8 mm Bildmarken-Höhe bei 300 dpi.</text>
    </g>

    <!-- 07: Farben -->
    <g inkscape:label="07-farben" id="farben">
        <text x="700" y="1080" class="label">07 — Verbindliche Farben</text>

        <g transform="translate(700, 1100)">
            <rect x="0" y="0" width="60" height="60" fill="#E3B505" />
            <text x="0" y="80" class="caption" font-weight="600" fill="#111111">Accent</text>
            <text x="0" y="94" class="caption">#E3B505</text>

            <rect x="80" y="0" width="60" height="60" fill="#111111" />
            <text x="80" y="80" class="caption" font-weight="600" fill="#111111">Ink</text>
            <text x="80" y="94" class="caption">#111111</text>

            <rect x="160" y="0" width="60" height="60" fill="#FAFAF7" stroke="#E4E2DB" stroke-width="1" />
            <text x="160" y="80" class="caption" font-weight="600" fill="#111111">Paper</text>
            <text x="160" y="94" class="caption">#FAFAF7</text>

            <rect x="240" y="0" width="60" height="60" fill="#2B2B28" />
            <text x="240" y="80" class="caption" font-weight="600" fill="#111111">Strong</text>
            <text x="240" y="94" class="caption">#2B2B28</text>
        </g>
    </g>

    <!-- Fuss -->
    <g inkscape:label="fuss" id="fuss">
        <line x1="60" y1="1440" x2="1140" y2="1440" stroke="#E4E2DB" stroke-width="1" />
        <text x="60" y="1465" class="caption">OfficeTalk · Stand April 2026 · Walter Senk / Gerhard Popp · Die unabhängige Immobilien Redaktion</text>
        <text x="60" y="1482" class="caption">Typografie: Fraunces Medium. Bei finaler Auslieferung Text in Pfade wandeln.</text>
    </g>

</svg>
